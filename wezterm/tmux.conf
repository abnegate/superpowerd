# superpowerd tmux configuration

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Pass escape sequences through to WezTerm
set -g allow-passthrough on
set -g set-titles on
set -g set-titles-string "#T"

# Mouse support (essential for mobile)
set -g mouse on

set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

# Status bar — superpowerd green theme
set -g status-style "bg=#062419,fg=#888888"
set -g status-left "#[fg=#5fafff,bold] #S "
set -g status-left-length 20
set -g status-right ""
set -g status-position bottom

# Pane borders
set -g pane-border-style "fg=#245032"
set -g pane-active-border-style "fg=#41a83e"

# Message style
set -g message-style "bg=#245032,fg=#f8f8f8"

# Window numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Allow programs to set the window title
setw -g automatic-rename off
set -g allow-rename on

# Vi mode for copy/scroll
setw -g mode-keys vi

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
